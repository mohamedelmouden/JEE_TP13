<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profil Utilisateur</title>
    <!-- Personnalisation : style ajouté -->
    <style>
        body { font-family: Arial, sans-serif; display: flex;
               justify-content: center; padding: 40px; }
        .card { border: 1px solid #ddd; border-radius: 12px;
                padding: 30px; text-align: center; width: 320px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        img { border-radius: 50%; margin-bottom: 16px; }
        .badge { background: #e8f5e9; color: #2e7d32; padding: 4px 10px;
                 border-radius: 20px; font-size: 13px; }
        a { color: #e53935; text-decoration: none; margin-top: 20px;
            display: inline-block; }
    </style>
</head>
<body>
<div class="card">
    <h2>Profil Google</h2>
    <!-- Code prof intact -->
    <img th:src="${picture}" width="100"/>
    <p>Nom : <span th:text="${name}"></span></p>
    <p>Email : <span th:text="${email}"></span></p>
    <!-- Personnalisation : badge + locale -->
    <span class="badge">Connecté via Google</span>
    <p>Langue : <span th:text="${locale}"></span></p>
    <!-- Code prof intact -->
    <a href="/logout">Se déconnecter</a>
</div>
</body>
</html>
